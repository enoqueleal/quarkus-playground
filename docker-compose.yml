services:

  quarkus-downstream:
    build:
      context: ./service-downstream
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: service-downstream-container
    ports:
      - 8080:8080
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  quarkus-upstream-sem-camel:
    depends_on:
      - quarkus-downstream
    build:
      context: ./service-upstream
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: service-upstream-container
    environment:
      - DOWNSTREAM_URL=http://quarkus-downstream:8080
    ports:
      - 8081:8081
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  quarkus-upstream-camel:
     depends_on:
       - quarkus-downstream
     build:
       context: ./service-upstream-camel
       dockerfile: src/main/docker/Dockerfile.jvm
     container_name: service-upstream-camel-container
     environment:
       - DOWNSTREAM_URL=http://quarkus-downstream:8080
     ports:
       - 8082:8082
     deploy:
       resources:
         limits:
           cpus: '1.0'
           memory: 1G
         reservations:
           cpus: '0.5'
           memory: 512M

  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: pgadmin-container
  #   environment:
  #     - PGADMIN_DEFAULT_EMAIL=admin@admin.com
  #     - PGADMIN_DEFAULT_PASSWORD=admin
  #   ports:
  #     - 5050:80
